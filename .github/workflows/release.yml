name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Read version from Makefile
        id: version
        run: |
          VERSION=$(grep '^VERSION=' Makefile | cut -d= -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Create tag
        run: |
          TAG=${{ steps.version.outputs.tag }}
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Build binaries
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          LDFLAGS="-X main.Version=${VERSION}"

          GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o bin/cllmhub-darwin-amd64  ./cmd/cllmhub
          GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o bin/cllmhub-darwin-arm64  ./cmd/cllmhub
          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o bin/cllmhub-linux-amd64   ./cmd/cllmhub
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o bin/cllmhub-linux-arm64   ./cmd/cllmhub
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o bin/cllmhub-windows-amd64.exe ./cmd/cllmhub

      - name: Generate checksums
        run: |
          cd bin
          sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: bin/*

      # --- npm publish ---
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm package version
        run: |
          cd npm
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: |
          cd npm
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- Update Homebrew formula ---
      - name: Update Homebrew formula
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SHA_DARWIN_AMD64=$(sha256sum bin/cllmhub-darwin-amd64 | awk '{print $1}')
          SHA_DARWIN_ARM64=$(sha256sum bin/cllmhub-darwin-arm64 | awk '{print $1}')
          SHA_LINUX_AMD64=$(sha256sum bin/cllmhub-linux-amd64 | awk '{print $1}')
          SHA_LINUX_ARM64=$(sha256sum bin/cllmhub-linux-arm64 | awk '{print $1}')

          sed -i "s/version \".*\"/version \"$VERSION\"/" Formula/cllmhub.rb
          sed -i "s/PLACEHOLDER_DARWIN_AMD64\|[a-f0-9]\{64\}/$SHA_DARWIN_AMD64/" Formula/cllmhub.rb
          sed -i "s/PLACEHOLDER_DARWIN_ARM64\|[a-f0-9]\{64\}/$SHA_DARWIN_ARM64/" Formula/cllmhub.rb
          sed -i "s/PLACEHOLDER_LINUX_AMD64\|[a-f0-9]\{64\}/$SHA_LINUX_AMD64/" Formula/cllmhub.rb
          sed -i "s/PLACEHOLDER_LINUX_ARM64\|[a-f0-9]\{64\}/$SHA_LINUX_ARM64/" Formula/cllmhub.rb

      - name: Commit updated Homebrew formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cllmhub.rb
          git diff --cached --quiet && echo "No formula changes" || git commit -m "Update Homebrew formula for v${{ steps.version.outputs.version }}"
          git push origin main
