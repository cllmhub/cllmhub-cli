name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Read version from Makefile
        id: version
        run: |
          VERSION=$(grep '^VERSION=' Makefile | cut -d= -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Create tag
        run: |
          TAG=${{ steps.version.outputs.tag }}
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Build binaries
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          LDFLAGS="-X main.Version=${VERSION}"

          GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o bin/cllmhub-darwin-amd64  ./cmd/cllmhub
          GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o bin/cllmhub-darwin-arm64  ./cmd/cllmhub
          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o bin/cllmhub-linux-amd64   ./cmd/cllmhub
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o bin/cllmhub-linux-arm64   ./cmd/cllmhub
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o bin/cllmhub-windows-amd64.exe ./cmd/cllmhub

      - name: Generate checksums
        run: |
          cd bin
          sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: bin/*
